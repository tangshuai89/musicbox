<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Maestro</title>
    <!-- Fonts: Fraunces (display, opsz-variable), Inter (UI), JetBrains Mono
         (digits). Loaded here rather than via a CSS @import so it doesn't
         fight SCSS module ordering; if offline (first Electron run with no
         network) the app falls back to the system stacks in --font-*. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
    />
  </head>
  <body>
    <div id="root"></div>
    <!-- Spotify Web Playback SDK. Loads only the script (no auto-init);
         spotify-wps.ts calls window.Spotify.Player when the user actually
         has a Premium spotify session. SdkLazy load by `defer` so it doesn't
         block first paint. -->
    <script src="https://sdk.scdn.co/spotify-player.js" defer></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
